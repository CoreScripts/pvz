<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Plants vs. Zombies</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0f120c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Arial Black', Gadget, sans-serif;
    }

    #canvas {
      display: block;
      outline: 0;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
    }

    #pvz-soft-keyboard {
      position: fixed; top: 0; left: 0; width: 1px; height: 1px; 
      opacity: 0; pointer-events: none; font-size: 16px;
    }

    /* Plants vs Zombies Theme Loading Overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0b0d09;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }

    .loader-card {
      width: 85%;
      max-width: 420px;
      text-align: center;
    }

    .loader-title {
      color: #a0db24;
      font-size: 2rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: 0 4px 0px #2c4406;
      text-transform: uppercase;
    }

    #loader-status {
      color: #798a6a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 0.9rem;
      margin-bottom: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .progress-track {
      width: 100%;
      height: 22px;
      background: #221a12; /* Dirt/Soil Brown */
      border: 3px solid #3a2e1f;
      border-radius: 12px;
      overflow: hidden;
      padding: 2px;
      box-sizing: border-box;
    }

    #progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #5ea80f, #8be022); /* Lawn Green Gradient */
      border-radius: 8px;
      transition: width 0.15s ease-out;
      box-shadow: 0 0 8px rgba(139, 224, 34, 0.4);
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="loader-card">
      <div class="loader-title">PLANTS VS. ZOMBIES</div>
      <div id="loader-status">RAISING THE LAWN...</div>
      <div class="progress-track">
        <div id="progress-fill"></div>
      </div>
    </div>
  </div>

  <canvas id="canvas" width="800" height="600"></canvas>

  <textarea
    id="pvz-soft-keyboard"
    autocapitalize="off"
    autocomplete="off"
    autocorrect="off"
    enterkeyhint="done"
    spellcheck="false"
  ></textarea>

  <script>
    let _res, _rej;
    window.moduleReadyPromise = new Promise((r, e) => { _res = r; _rej = e; });

    var Module = {
      canvas: document.getElementById("canvas"),
      noInitialRun: true,
      onRuntimeInitialized: _res,
      onAbort: e => _rej(e),
      print: console.log,
      printErr: console.warn,
    };
  </script>

  <script>
    const loaderStatus = document.querySelector("#loader-status");
    const progressFill = document.querySelector("#progress-fill");
    const loadingOverlay = document.querySelector("#loading-overlay");
    
    let loadedBytes = 0;
    const mbTotal = 43.34;
    const targetBytes = mbTotal * 1024 * 1024;

    async function fetchWithProgress(url) {
      const response = await fetch(url);
      const reader = response.body.getReader();
      let chunks = [];
      let received = 0;
      
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);
        
        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        
        // Scale downloading phase to occupy 0% to 85% of the visual progress track
        let downloadPercent = Math.min(85, Math.round((loadedBytes / targetBytes) * 85));
        progressFill.style.width = downloadPercent + "%";
        loaderStatus.textContent = `GATHERING SUNLIGHT: ${mbDone} / ${mbTotal} MB`;
      }
      
      let fullBuffer = new Uint8Array(received);
      let offset = 0;
      for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
      }
      return fullBuffer.buffer;
    }

    async function mergeFiles(fileParts, cacheKey) {
      const cache = await caches.open("pvz-cache");
      const cachedResponse = await cache.match(cacheKey);
      if (cachedResponse) {
        const blob = await cachedResponse.blob();
        return URL.createObjectURL(blob);
      }
      const buffers = await Promise.all(
        fileParts.map(part => fetchWithProgress(part))
      );
      const mergedBlob = new Blob(buffers);
      const response = new Response(mergedBlob);
      await cache.put(cacheKey, response);
      return URL.createObjectURL(mergedBlob);
    }

    function getParts(file, start, end) {
      let parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }
    
    (async () => {
      // Step 1: Download split asset components relatively from the repository
      const [pakurl] = await Promise.all([
        mergeFiles(getParts("main.pak", 1, 3), "main.pak"),
      ]);
      
      progressFill.style.width = "90%";
      loaderStatus.textContent = "PLANTING CODE ENGINES...";
      
      let ns = document.createElement("script");
      ns.src = "pvz.js";
      document.body.appendChild(ns);
      await moduleReadyPromise;

      progressFill.style.width = "95%";
      loaderStatus.textContent = "DIGGING VIRTUAL STORAGE...";

      const files = [
        [pakurl, "main.pak"],
        ["properties/Layout.xml", "properties/Layout.xml"],
        ["properties/partner.xml.sig", "properties/partner.xml.sig"],
        ["properties/default.xml", "properties/default.xml"],
        ["properties/partner.xml", "properties/partner.xml"],
        ["properties/partner_logo.jpg", "properties/partner_logo.jpg"],
      ];

      for (const [src, dest] of files) {
        const data = new Uint8Array(await (await fetch(src)).arrayBuffer());
        const parts = dest.split("/");
        let dir = "/";
        for (let i = 0; i < parts.length - 1; i++) {
          dir += (dir === "/" ? "" : "/") + parts[i];
          try { Module.FS.mkdir(dir); } catch {}
        }
        Module.FS.writeFile("/" + dest, data);
      }

      try { Module.FS.mkdir("/saves"); } catch {}
      try { Module.FS.mount(Module.FS.filesystems.IDBFS, {}, "/saves"); } catch {}
      await new Promise(r => Module.FS.syncfs(true, r));

      progressFill.style.width = "100%";
      loaderStatus.textContent = "THE ZOMBIES ARE COMING!";

      const c = document.getElementById("canvas");
      const resize = () => {
        const s = Math.min(innerWidth / 800, innerHeight / 600);
        c.style.width  = s * 800 + "px";
        c.style.height = s * 600 + "px";
      };
      resize();
      addEventListener("resize", resize);
      addEventListener("fullscreenchange", resize);

      const sync = () => Module.FS.syncfs(false, () => {});
      setInterval(sync, 5000);
      addEventListener("visibilitychange", () => document.hidden && sync());
      addEventListener("pagehide", sync);

      // Launch compiled runtime bundle
      Module.callMain([]);
      
      // Smooth fade-out transition instead of an abrupt element deletion
      loadingOverlay.style.opacity = "0";
      setTimeout(() => {
        loadingOverlay.remove();
      }, 500);
    })();
  </script>
</body>
</html>
